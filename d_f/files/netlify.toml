# ─────────────────────────────────────────────
# Luminary — Netlify Configuration
# No build step. HTML files sit at repo root.
# Functions in netlify/functions/
# ─────────────────────────────────────────────

[build]
  publish = "."
  functions = "netlify/functions"

# Route /api/* to serverless functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
